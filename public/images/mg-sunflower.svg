<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- soil base -->
  <ellipse cx="100" cy="178" rx="72" ry="12" fill="#8B6340"/>
  <rect x="28" y="170" width="144" height="18" rx="4" fill="#8B6340"/>
  <rect x="28" y="170" width="144" height="6" rx="2" fill="#A0784E"/>

  <!-- stem 1 - left -->
  <path d="M72 170 C70 145 65 125 62 100" stroke="#6BAF3C" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- stem 2 - center -->
  <path d="M100 170 C100 148 100 128 100 98" stroke="#6BAF3C" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- stem 3 - right -->
  <path d="M128 170 C130 145 135 125 138 100" stroke="#6BAF3C" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- stem 4 - far left -->
  <path d="M58 170 C55 150 50 132 46 108" stroke="#7ABF46" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- stem 5 - far right -->
  <path d="M142 170 C145 150 150 132 154 108" stroke="#7ABF46" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- seed hull on center stem -->
  <ellipse cx="100" cy="92" rx="9" ry="6" fill="#3A2A1A" transform="rotate(-10,100,92)"/>
  <ellipse cx="100" cy="92" rx="7" ry="4.5" fill="#5A3E28" transform="rotate(-10,100,92)"/>

  <!-- leaf pair - left stem -->
  <ellipse cx="50" cy="94" rx="18" ry="9" fill="#5CB83A" transform="rotate(-30,50,94)"/>
  <ellipse cx="74" cy="90" rx="18" ry="9" fill="#7ACF50" transform="rotate(25,74,90)"/>

  <!-- leaf pair - center stem -->
  <ellipse cx="82" cy="82" rx="20" ry="10" fill="#5CB83A" transform="rotate(-35,82,82)"/>
  <ellipse cx="118" cy="82" rx="20" ry="10" fill="#7ACF50" transform="rotate(35,118,82)"/>

  <!-- leaf pair - right stem -->
  <ellipse cx="126" cy="94" rx="18" ry="9" fill="#5CB83A" transform="rotate(-25,126,94)"/>
  <ellipse cx="150" cy="94" rx="18" ry="9" fill="#7ACF50" transform="rotate(30,150,94)"/>

  <!-- leaf pair - far left -->
  <ellipse cx="32" cy="102" rx="15" ry="7" fill="#6BBF44" transform="rotate(-25,32,102)"/>
  <ellipse cx="58" cy="100" rx="15" ry="7" fill="#5AAF34" transform="rotate(20,58,100)"/>

  <!-- leaf pair - far right -->
  <ellipse cx="142" cy="100" rx="15" ry="7" fill="#6BBF44" transform="rotate(-20,142,100)"/>
  <ellipse cx="168" cy="102" rx="15" ry="7" fill="#5AAF34" transform="rotate(25,168,102)"/>

  <!-- seed hull left -->
  <ellipse cx="62" cy="94" rx="8" ry="5" fill="#3A2A1A" transform="rotate(-15,62,94)"/>
  <ellipse cx="62" cy="94" rx="6" ry="3.5" fill="#5A3E28" transform="rotate(-15,62,94)"/>
  <!-- seed hull right -->
  <ellipse cx="138" cy="94" rx="8" ry="5" fill="#3A2A1A" transform="rotate(15,138,94)"/>
  <ellipse cx="138" cy="94" rx="6" ry="3.5" fill="#5A3E28" transform="rotate(15,138,94)"/>

  <!-- vein details on a few leaves -->
  <line x1="82" y1="82" x2="70" y2="78" stroke="#4AA028" stroke-width="0.8" opacity="0.7"/>
  <line x1="118" y1="82" x2="130" y2="78" stroke="#4AA028" stroke-width="0.8" opacity="0.7"/>
  <line x1="100" y1="84" x2="100" y2="76" stroke="#4AA028" stroke-width="0.8" opacity="0.7"/>
</svg>
