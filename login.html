<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — The Tray Microgreens</title>
    <link rel="icon" type="image/png" href="logo/logo1.png">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #f7f8f4; display: flex; flex-direction: column; min-height: 100vh; }
        .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
        .auth-card {
            background: #fff;
            border-radius: 18px;
            padding: 40px 36px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 4px 32px rgba(0,0,0,0.08);
        }
        .auth-logo { text-align: center; margin-bottom: 24px; }
        .auth-logo img { height: 56px; }
        .auth-title { font-size: 24px; font-weight: 800; color: #1a2b1a; text-align: center; margin: 0 0 6px; }
        .auth-subtitle { color: #666; text-align: center; font-size: 14px; margin: 0 0 28px; }
        .auth-error { background: #fff0f0; color: #c0392b; border-radius: 8px; padding: 10px 14px; font-size: 14px; margin-bottom: 16px; }
        .auth-success { background: #f0fff4; color: #276749; border-radius: 8px; padding: 10px 14px; font-size: 14px; margin-bottom: 16px; }
        .auth-form label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
        .auth-form input {
            width: 100%; padding: 11px 14px; border: 1.5px solid #dde3d8; border-radius: 10px;
            font-size: 15px; outline: none; box-sizing: border-box; margin-bottom: 16px;
            transition: border 0.2s;
        }
        .auth-form input:focus { border-color: #7ab55c; }
        .auth-submit {
            width: 100%; padding: 13px; background: #7ab55c; color: #fff; border: none;
            border-radius: 30px; font-weight: 800; font-size: 14px; letter-spacing: 0.06em;
            cursor: pointer; transition: background 0.2s;
        }
        .auth-submit:hover { background: #689b4c; }
        .auth-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .auth-divider { text-align: center; color: #aaa; font-size: 13px; margin: 18px 0; position: relative; }
        .auth-divider::before, .auth-divider::after {
            content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: #e5e9e0;
        }
        .auth-divider::before { left: 0; }
        .auth-divider::after { right: 0; }
        .auth-google {
            width: 100%; padding: 12px; background: #fff; border: 1.5px solid #dde3d8;
            border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: background 0.2s;
        }
        .auth-google:hover { background: #f7f8f4; }
        .auth-google:disabled { opacity: 0.6; cursor: not-allowed; }
        .auth-foot { text-align: center; font-size: 13px; color: #666; margin-top: 22px; }
        .auth-foot a { color: #7ab55c; font-weight: 700; text-decoration: none; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <a href="index.html"><img src="logo/logo.png" alt="The Tray Microgreens Logo"></a>
            </div>
        </div>
    </header>

    <div class="auth-wrap">
        <div class="auth-card">
            <div class="auth-logo"><img src="logo/logo.png" alt="The Tray"></div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to manage your subscription.</p>

            <div id="auth-msg" style="display:none"></div>

            <form class="auth-form" id="loginForm">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="you@example.com" autocomplete="email">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
                <button type="submit" class="auth-submit" id="submitBtn">SIGN IN</button>
            </form>

            <div class="auth-divider">or</div>

            <button class="auth-google" id="googleBtn">
                <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.61z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.83.86-3.04.86-2.34 0-4.32-1.58-5.03-3.7H.96v2.32A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.97 10.71A5.4 5.4 0 0 1 3.68 9c0-.59.1-1.17.29-1.71V4.96H.96A9 9 0 0 0 0 9c0 1.45.35 2.83.96 4.04l3.01-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A9 9 0 0 0 9 0 9 9 0 0 0 .96 4.96l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z"/></svg>
                Continue with Google
            </button>

            <p class="auth-foot">Don't have an account? <a href="signup.html">Create one</a></p>
        </div>
    </div>

    <script>
        // Replace with your actual Supabase project URL and anon key
        const SUPABASE_URL = 'https://jpiztqskhqicwnvvowpm.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_sc4wVYZ2LimOJZ9d87ac_g_a4W7Qw0z';

        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const msg = document.getElementById('auth-msg');
        const submitBtn = document.getElementById('submitBtn');
        const googleBtn = document.getElementById('googleBtn');

        function showMsg(text, type) {
            msg.className = type === 'error' ? 'auth-error' : 'auth-success';
            msg.textContent = text;
            msg.style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in…';
            msg.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
                showMsg(error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'SIGN IN';
            } else {
                showMsg('Signed in! Redirecting…', 'success');
                setTimeout(() => { window.location.href = 'index.html'; }, 1000);
            }
        });

        googleBtn.addEventListener('click', async () => {
            googleBtn.disabled = true;
            const { error } = await sb.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin + '/index.html' }
            });
            if (error) {
                showMsg(error.message, 'error');
                googleBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
